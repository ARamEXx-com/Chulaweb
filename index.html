<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

var firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "chulaweb.firebaseapp.com",
  databaseURL: "https://chulaweb-809f3-default-rtdb.firebaseio.com/",
  projectId: "chulaweb"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.database().ref("messages");

function sendMessage(){

var input = document.getElementById("messageInput");
var message = input.value;

db.push({
text: message
});

input.value="";
}

db.on("child_added", function(data){

var msgBox = document.createElement("div");
msgBox.innerText = data.val().text;

document.getElementById("messages").appendChild(msgBox);

});

</script>flex:1;

<body>

<div class="chat-container">

</div>

<div class="input-area">
<input id="messageInput" placeholder="Type a message">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

function sendMessage(){

var input = document.getElementById("messageInput");

var message = input.value;

var msgBox = document.createElement("div");

msgBox.innerText = message;

document.getElementById("messages").appendChild(msgBox);

input.value="";

}

</script>
