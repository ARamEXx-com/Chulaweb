<!DOCTYPE html>
<html>

<head>
<title>ChulaWeb</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#6a11cb,#2575fc);
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.container{
background:white;
color:black;
width:350px;
padding:25px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

h1{
margin-top:0;
}

input{
width:80%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
margin-top:10px;
padding:10px 20px;
border:none;
background:#2575fc;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1a5ed8;
}

</style>

</head>

<body>

<div class="container">

<h1>ChulaWeb ❤️</h1>

<p>Unique chat for the bigs.</p>

<input type="text" placeholder="Type your message">

<br>

<button>Send</button>

</div>

</body>

</html>
