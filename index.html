<!DOCTYPE html>
<html>

<head>
<title>ChulaWeb</title>

<style>

body{
font-family: Arial;
background:#ece5dd;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chat-container{
width:350px;
height:500px;
background:white;
border-radius:10px;
display:flex;
flex-direction:column;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.header{
background:#075e54;
color:white;
padding:15px;
font-weight:bold;
}

.messages{
flex:1;
padding:10px;
overflow-y:auto;
}

.input-area{
display:flex;
border-top:1px solid #ccc;
}

input{
flex:1;
padding:10px;
border:none;
outline:none;
}

button{
background:#25d366;
border:none;
padding:10px 15px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="chat-container">

<div class="header">
ChulaWeb Chat ❤️
</div>

<div class="messages" id="messages">
</div>

<div class="input-area">
<input id="messageInput" placeholder="Type a message">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

function sendMessage(){

var input = document.getElementById("messageInput");

var message = input.value;

var msgBox = document.createElement("div");

msgBox.innerText = message;

document.getElementById("messages").appendChild(msgBox);

input.value="";

}

</script>

</body>

</html>
